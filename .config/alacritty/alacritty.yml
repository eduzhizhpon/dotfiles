font:
  normal:
    family: "Fira Code"
    style: Regular

  bold:
    family: "Fira Code"
    style: Bold

  italic:
    family: "Fira Code"
    style: Italic

  bold_italic:
    family: "Fira Code"
    style: Bold Italic

  size: 8

cursor:
  style:
    shape: Beam
    blinking: Always
  vi_mode_style:
    shape: Beam
  blink_interval: 400
  unfocused_hollow: true
  thickness: 0.15

window:
  opacity: 0.85
  padding:
    x: 10
    y: 10

# ==================================================
# Colors schemes
# ==================================================

schemes:
  Dracula: &Dracula
    primary:
      #background: '0x282a36'
      background: '0x14191e'
      #foreground: '0xf8f8f2'
      foreground: '0xf8f8f8'

    # Normal colors
    normal:
      black:   '0x000000'
      red:     '0xff5555'
      green:   '0x50fa7b'
      yellow:  '0xf1fa8c'
      blue:    '0xcaa9fa'
      magenta: '0xff79c6'
      cyan:    '0x8be9fd'
      white:   '0xbfbfbf'

    # Bright colors
    bright:
      black:   '0x282a35'
      red:     '0xff6e67'
      green:   '0x5af78e'
      yellow:  '0xf4f99d'
      blue:    '0xcaa9fa'
      magenta: '0xff92d0'
      cyan:    '0x9aedfe'
      white:   '0xe6e6e6'

  Custom: &Custom
